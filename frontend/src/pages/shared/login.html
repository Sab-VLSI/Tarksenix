<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Secure portal for EnergyNest. Login or create an account.">
    <meta name="theme-color" content="#f8fafb">
    <link rel="manifest" href="../../components/manifest.json">
    <title>Login / Signup - EnergyNest</title>
    <link rel="stylesheet" href="../../components/login.css">
    <style>
        /* Integrated Role Selection Styles */
        .role-selection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
            animation: fadeIn 0.4s ease-out;
        }

        .selection-card {
            background: var(--color-bg-light);
            border: 2px solid rgba(0, 212, 232, 0.1);
            border-radius: 1rem;
            padding: 1.25rem 0.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.75rem;
            position: relative;
        }

        .selection-card:hover {
            background: var(--color-bg-white);
            border-color: var(--color-energy-cyan);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .selection-card.selected {
            border-color: var(--color-energy-cyan);
            background: rgba(0, 212, 232, 0.05);
            box-shadow: 0 0 0 2px rgba(0, 212, 232, 0.2);
        }

        .role-icon-box {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .selection-card.selected .role-icon-box {
            background: var(--gradient-primary);
            color: white;
        }

        .role-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 0.125rem;
        }

        .role-desc {
            font-size: 0.7rem;
            color: var(--color-text-secondary);
            line-height: 1.3;
        }

        .check-icon {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 16px;
            height: 16px;
            color: var(--color-energy-cyan);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .selection-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .i-am-text {
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 0.9375rem;
            font-weight: 600;
            margin-bottom: -0.5rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .role-selection-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Background decoration -->
        <div class="bg-decoration">
            <div class="energy-particle" style="--x: 10%; --y: 20%; --delay: 0s;"></div>
            <div class="energy-particle" style="--x: 85%; --y: 15%; --delay: 1.5s;"></div>
            <div class="energy-particle" style="--x: 15%; --y: 75%; --delay: 3s;"></div>
            <div class="energy-particle" style="--x: 90%; --y: 80%; --delay: 4.5s;"></div>
        </div>

        <!-- Main card -->
        <div class="login-card">
            <!-- Header section -->
            <header class="card-header">
                <div class="logo-container">
                    <svg class="logo-icon" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="30" cy="30" r="25" fill="none" stroke="url(#logoGradient)" stroke-width="2"
                            opacity="0.3" />
                        <path d="M 32 15 L 24 30 L 30 30 L 28 45 L 36 30 L 30 30 Z" fill="url(#logoGradient)" />
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#b4ff39;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-name">EnergyNest</h1>
                <p class="app-subtitle" id="formSubtitle">Energy as a Service</p>
            </header>

            <!-- Tab switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Signup</button>
                <div class="tab-indicator" style="transform: translateX(0);"></div>
            </div>

            <div class="forms-container" style="margin-top: 1rem;">
                <!-- Login form -->
                <section class="auth-form active" id="loginSection">
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginEmail" class="form-label">Email</label>
                            <input type="email" id="loginEmail" name="email" class="form-input"
                                placeholder="Enter your email" autocomplete="email" required />
                        </div>

                        <div class="form-group">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" id="loginPassword" name="password" class="form-input"
                                placeholder="Enter your password" autocomplete="current-password" required />
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <span>Login</span>
                            <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>

                        <button type="button" class="forgot-password">Forgot password?</button>
                    </form>
                </section>

                <!-- Signup Selection Section -->
                <section class="auth-form" id="signupSection">
                    <p class="i-am-text">I am a:</p>
                    <div class="role-selection-grid">
                        <!-- Home Owner -->
                        <div class="selection-card" onclick="selectRole('homeowner', this)">
                            <div class="role-icon-box">🏠</div>
                            <div class="role-info">
                                <h3 class="role-title">Home Owner</h3>
                                <p class="role-desc">Manage your clean energy and savings.</p>
                            </div>
                            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>

                        <!-- Vendors -->
                        <div class="selection-card" onclick="selectRole('vendor', this)">
                            <div class="role-icon-box">🛠️</div>
                            <div class="role-info">
                                <h3 class="role-title">Vendors</h3>
                                <p class="role-desc">Provide services and installations.</p>
                            </div>
                            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>

                        <!-- Energy Company -->
                        <div class="selection-card" onclick="selectRole('company', this)">
                            <div class="role-icon-box">⚡</div>
                            <div class="role-info">
                                <h3 class="role-title">Energy Company</h3>
                                <p class="role-desc">Monitor grid and manage distribution.</p>
                            </div>
                            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="continueBtn" onclick="handleContinue()" disabled
                        style="opacity: 0.5; background: linear-gradient(135deg, #00f5ff, #b4ff39); border: none; color: #1a1f36;">
                        <span>Continue to Signup</span>
                        <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </section>
            </div>
        </div>

        <!-- Footer note -->
        <footer class="page-footer">
            <p>By continuing, you agree to our Terms of Service and Privacy Policy</p>
        </footer>
    </div>

    <!-- Combined Scripts -->
    <script src="../../components/login.js"></script>
    <script>
        // Integrated Role Selection Logic
        let selectedRole = null;
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabIndicator = document.querySelector('.tab-indicator');
        const loginSection = document.getElementById('loginSection');
        const signupSection = document.getElementById('signupSection');
        const formSubtitle = document.getElementById('formSubtitle');

        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');

                // Update active tab state
                tabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (tab === 'login') {
                    tabIndicator.style.transform = 'translateX(0)';
                    loginSection.classList.add('active');
                    signupSection.classList.remove('active');
                    formSubtitle.textContent = 'Energy as a Service';
                } else {
                    tabIndicator.style.transform = 'translateX(calc(100% + 0.25rem))';
                    loginSection.classList.remove('active');
                    signupSection.classList.add('active');
                    formSubtitle.textContent = 'Join the Future of Energy';
                }
            });
        });

        function selectRole(role, element) {
            selectedRole = role;
            document.querySelectorAll('.selection-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');

            const btn = document.getElementById('continueBtn');
            btn.disabled = false;
            btn.style.opacity = '1';
        }

        function handleContinue() {
            if (!selectedRole) return;
            localStorage.setItem('userRole', selectedRole);
            const targets = {
                'homeowner': '/pages/homeowner/signup-homeowner.html',
                'vendor': '/pages/vendor/signup-vendor.html',
                'company': '/pages/company/signup-company.html'
            };
            window.location.href = targets[selectedRole];
        }
    </script>
</body>

</html>
