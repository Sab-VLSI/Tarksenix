<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html {
            background: #f8fafb
        }

        body {
            visibility: hidden
        }

        body.si-loaded {
            visibility: visible
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="description" content="Buildings — per-building solar allocation and efficiency.">
    <title>Buildings — EnergyNest</title>
    <link rel="stylesheet" href="../../components/dashboard-common.css">
    <style>
        .bl-section {
            background: var(--color-white);
            border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .04)
        }

        .bl-title {
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--color-text-secondary);
            margin-bottom: .8rem;
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            animation: bdot 2s infinite
        }

        @keyframes bdot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .4;
                transform: scale(.7)
            }
        }

        .bl-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch
        }

        .bl-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .75rem
        }

        .bl-table th {
            text-align: left;
            padding: .4rem .35rem;
            font-size: .64rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-border);
            white-space: nowrap
        }

        .bl-table td {
            padding: .65rem .35rem;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text-primary);
            vertical-align: middle
        }

        .bl-table tr:last-child td {
            border-bottom: none
        }

        .bl-table tbody tr:hover td {
            background: var(--color-bg)
        }

        .eff-bar {
            height: 4px;
            border-radius: 99px;
            background: var(--color-border);
            position: relative;
            overflow: hidden;
            margin-top: 3px
        }

        .eff-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: 99px
        }

        .bl-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            padding: 2rem;
            color: var(--color-text-muted);
            font-size: .82rem
        }

        .bl-spinner::before {
            content: '';
            width: 18px;
            height: 18px;
            border: 2.5px solid var(--color-border);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .bl-empty {
            text-align: center;
            padding: 1.5rem;
            color: var(--color-text-muted);
            font-size: .82rem
        }

        .bl-refresh {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: .67rem;
            color: var(--color-text-muted);
            padding: 0 .1rem .65rem
        }

        .bl-live {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 4px;
            animation: bdot 1.5s infinite
        }

        .bl-legend {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            font-size: .68rem;
            color: var(--color-text-secondary);
            margin-bottom: .6rem
        }

        .leg-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 3px
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-text">
                    <h1 class="dashboard-title h1-compact">Buildings</h1>
                    <p class="dashboard-subtitle text-xs">Solar allocation &amp; grid backup per building</p>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle-btn" onclick="toggleTheme()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon">
                            <path
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <button class="notification-btn" onclick="window.location.href='alerts-company.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="bl-refresh">
                <span><span class="bl-live"></span>Live · refreshes every 5 s</span>
                <span id="blUpdated">—</span>
            </div>

            <div class="bl-section" style="margin-bottom:5.5rem">
                <p class="bl-title"><span class="live-dot" style="background:#10b981"></span>Energy Allocation
                    Performance</p>
                <div class="bl-legend">
                    <span><span class="leg-dot" style="background:#10b981"></span>Solar allocated</span>
                    <span><span class="leg-dot" style="background:#3b82f6"></span>Grid backup</span>
                    <span><span class="leg-dot" style="background:#f59e0b"></span>Efficiency</span>
                </div>
                <div id="tableContent" class="bl-spinner">Loading…</div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='dashboard-company.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>Dashboard</span>
            </button>
            <button class="nav-item" onclick="window.location.href='company-solar.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>Solar</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='company-buildings.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m4 0h1m-5 4h1m4 0h1m-5 4h1m4 0h1"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>Buildings</span>
            </button>
            <button class="nav-item" onclick="window.location.href='company-ai-control.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>AI Control</span>
            </button>
            <button class="nav-item" onclick="window.location.href='profile-company.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                        stroke-linecap="round" />
                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>
    <script src="../../components/login.js"></script>
    <script>
        function fmt(v, d = 1) { if (v == null || isNaN(v)) return '—'; return parseFloat(v).toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d }); }
        function effColor(p) { return p >= 90 ? '#10b981' : p >= 75 ? '#f59e0b' : '#ef4444'; }

        async function loadBuildings() {
            const el = document.getElementById('tableContent');
            try {
                const rows = await apiCall('/api/company/building-performance');
                if (!rows || !rows.length) { el.innerHTML = '<p class="bl-empty">No building data yet.</p>'; return; }
                const trs = rows.map(r => {
                    const ec = effColor(r.efficiency_percent);
                    return `<tr>
                <td><strong style="font-size:.78rem">${r.building_name}</strong></td>
                <td style="text-align:center">${r.subscribers}</td>
                <td style="text-align:right;color:#10b981;font-weight:700">${fmt(r.allocated_kwh)}</td>
                <td style="text-align:right;color:#3b82f6;font-weight:700">${fmt(r.grid_kwh)}</td>
                <td style="min-width:72px">
                    <span style="font-weight:700;color:${ec}">${r.efficiency_percent}%</span>
                    <div class="eff-bar"><div class="eff-fill" style="width:${r.efficiency_percent}%;background:${ec}"></div></div>
                </td>
            </tr>`;
                }).join('');
                el.innerHTML = `
        <div class="bl-wrap">
            <table class="bl-table">
                <thead><tr>
                    <th>Building</th>
                    <th style="text-align:center">Users</th>
                    <th style="text-align:right">Solar (kWh)</th>
                    <th style="text-align:right">Grid (kWh)</th>
                    <th>Efficiency</th>
                </tr></thead>
                <tbody>${trs}</tbody>
            </table>
        </div>`;
            } catch (e) { el.innerHTML = '<p class="bl-empty">Building data unavailable.</p>'; }
        }

        async function refresh() {
            await loadBuildings();
            document.getElementById('blUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        document.addEventListener('DOMContentLoaded', () => { refresh(); setInterval(refresh, 5000); });
    </script>
    <script>document.addEventListener("DOMContentLoaded", function () { requestAnimationFrame(function () { document.body.classList.add("si-loaded") }); })</script>
</body>

</html>
